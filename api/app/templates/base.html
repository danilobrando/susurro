<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>{% block title %}Susurro{% endblock %}</title>
<style>
:root {
  --bg: #0a0a0b; --bg-card: #131316; --bg-card-2: #1a1a1e;
  --fg: #f4f4f5; --fg-muted: #a1a1aa; --fg-faint: #71717a;
  --border: #27272a; --accent: #ffffff;
  --code-bg: #18181b; --green: #4ade80; --red: #f87171;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--fg);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", system-ui, sans-serif;
  font-size: 16px; line-height: 1.6;
  -webkit-font-smoothing: antialiased; min-height: 100vh;
}
.container { max-width: 560px; margin: 0 auto; padding: 64px 24px; }
.container.wide { max-width: 880px; }
.logo { font-weight: 600; font-size: 17px; display: inline-flex; align-items: center; gap: 8px; margin-bottom: 48px; color: var(--fg); text-decoration: none; }
.logo svg { width: 20px; height: 20px; }
h1 { font-size: clamp(28px, 5vw, 40px); font-weight: 700; letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 16px; }
h2 { font-size: 22px; font-weight: 600; margin-bottom: 12px; }
p { color: var(--fg-muted); margin-bottom: 16px; }
.lede { font-size: 18px; color: var(--fg-muted); margin-bottom: 32px; }
a { color: var(--fg); }
form { display: flex; flex-direction: column; gap: 12px; max-width: 420px; margin-bottom: 24px; }
input[type=email], input[type=text] {
  background: var(--bg-card); border: 1px solid var(--border);
  padding: 12px 14px; border-radius: 8px; color: var(--fg); font-size: 15px;
  font-family: inherit;
}
input:focus { outline: none; border-color: var(--fg-muted); }
button, .btn {
  background: var(--accent); color: var(--bg); border: 1px solid var(--accent);
  padding: 12px 18px; border-radius: 8px; font-size: 15px; font-weight: 500;
  cursor: pointer; font-family: inherit; text-decoration: none; display: inline-block;
  transition: transform 0.15s;
}
button:hover, .btn:hover { transform: translateY(-1px); }
.btn-secondary {
  background: var(--bg-card); color: var(--fg); border: 1px solid var(--border);
}
.card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 10px; padding: 24px; margin-bottom: 16px;
}
.token-box {
  background: var(--code-bg); border: 1px solid var(--border);
  border-radius: 8px; padding: 16px;
  font-family: "SF Mono", Menlo, monospace; font-size: 13px;
  word-break: break-all; user-select: all; cursor: text; line-height: 1.4;
  margin: 16px 0;
}
.kbd { background: var(--bg-card-2); border: 1px solid var(--border); padding: 1px 6px; border-radius: 4px; font-family: "SF Mono", Menlo, monospace; font-size: 12px; }
.bar { background: var(--bg-card-2); border-radius: 6px; height: 8px; overflow: hidden; margin: 12px 0 6px; }
.bar-fill { background: var(--accent); height: 100%; transition: width 0.3s; }
.bar-fill.warn { background: var(--red); }
.small { font-size: 13px; color: var(--fg-faint); }
hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
nav.top { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
nav.top .logo { margin: 0; }
nav.top a { color: var(--fg-muted); text-decoration: none; font-size: 14px; margin-left: 16px; }
nav.top a:hover { color: var(--fg); }
.copy-btn {
  background: var(--bg-card-2); border: 1px solid var(--border);
  padding: 6px 12px; border-radius: 6px; font-size: 12px;
  color: var(--fg-muted); cursor: pointer; font-family: inherit;
}
.copy-btn:hover { color: var(--fg); }
</style>
</head>
<body>
{% block nav %}{% endblock %}
<div class="container {% block container_class %}{% endblock %}">
  {% block content %}{% endblock %}
</div>
{% block scripts %}{% endblock %}
</body>
</html>
